services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - app_vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-soundit_psa}
      MYSQL_USER: ${DB_USERNAME:-soundit_psa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-soundit_psa}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-soundit_psa_root}
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - db_data:/var/lib/mysql

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90
    profiles:
      - workers
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    profiles:
      - workers
    volumes:
      - .:/var/www/html
      - app_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache

volumes:
  db_data:
  app_vendor:
  composer_cache:
