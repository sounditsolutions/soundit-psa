<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Too Large</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a365d; --accent: #fed136; --text-body: #374151; --text-muted: #6b7280; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text-body); display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; }
        .container { text-align: center; max-width: 480px; padding: 2rem; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--primary); font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.6; }
        a { display: inline-block; background: var(--primary); color: #fff; text-decoration: none; padding: 0.5rem 1.5rem; border-radius: 6px; font-weight: 500; }
        a:hover { background: #234179; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128196;</div>
        <h1>File Too Large</h1>
        <p>The file you tried to upload exceeds the maximum allowed size of 20 MB. Please reduce the file size and try again.</p>
        <a href="javascript:history.back()">Go Back</a>
    </div>
</body>
</html>
